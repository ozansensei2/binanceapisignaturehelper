<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Screenshot → Word kopyala</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 48px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .topbar-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hint {
      font-size: 13px;
      color: #8b949e;
      max-width: 520px;
      line-height: 1.45;
    }
    label.file-btn {
      display: inline-block;
      cursor: pointer;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      color: #e6edf3;
    }
    label.file-btn:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }
    input[type="file"] {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
    }
    .copy-btn {
      align-self: flex-start;
      background: #238636;
      border: 1px solid #2ea043;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .copy-btn:hover:not(:disabled) {
      background: #2ea043;
    }
    .copy-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .preview-wrap {
      border: 1px solid #30363d;
      border-radius: 10px;
      background: #161b22;
      padding: 20px;
      min-height: 360px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }
    .preview-wrap h2 {
      margin: 0 0 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8b949e;
    }
    #stack {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    #stack figure {
      margin: 0;
    }
    #stack figcaption {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 10px;
      font-family: ui-monospace, monospace;
    }
    #stack img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #0d1117;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #238636;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 10;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="topbar-left">
        <label class="file-btn">
          Görselleri seç (PNG/JPEG)
          <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp" multiple />
        </label>
        <p class="hint">
          <code>shots/</code> klasöründeki dosyaları seçin; önizleme aşağıda üst üste dizilir.
          Sağ üstteki <strong>Word için kopyala</strong> ile tüm blok panoya gider — Word’de yapıştırın (Ctrl+V).
          İsterseniz görselleri sürükleyip buraya da bırakabilirsiniz.
        </p>
      </div>
      <button type="button" class="copy-btn" id="copy-btn" disabled>Word için kopyala</button>
    </div>

    <div class="preview-wrap">
      <h2>Önizleme</h2>
      <div id="stack" aria-live="polite"></div>
    </div>
  </div>
  <div class="toast" id="toast" role="status">Panoya kopyalandı</div>

  <script>
    const fileInput = document.getElementById("file-input");
    const stack = document.getElementById("stack");
    const copyBtn = document.getElementById("copy-btn");
    const toast = document.getElementById("toast");

    /** @type {{ name: string, dataUrl: string }[]} */
    let items = [];

    function sortByName(a, b) {
      return a.name.localeCompare(b.name, undefined, { numeric: true });
    }

    function render() {
      stack.innerHTML = "";
      [...items].sort(sortByName).forEach(({ name, dataUrl }) => {
        const fig = document.createElement("figure");
        const cap = document.createElement("figcaption");
        cap.textContent = name;
        const img = document.createElement("img");
        img.src = dataUrl;
        img.alt = name;
        fig.appendChild(cap);
        fig.appendChild(img);
        stack.appendChild(fig);
      });
      copyBtn.disabled = items.length === 0;
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve({ name: file.name, dataUrl: String(r.result) });
        r.onerror = () => reject(r.error);
        r.readAsDataURL(file);
      });
    }

    async function addFiles(fileList) {
      const arr = Array.from(fileList || []).filter(f => f.type.startsWith("image/"));
      if (!arr.length) return;
      const loaded = await Promise.all(arr.map(readFileAsDataURL));
      const seen = new Set(items.map(i => i.name + "\0" + i.dataUrl.slice(0, 80)));
      for (const it of loaded) {
        const key = it.name + "\0" + it.dataUrl.slice(0, 80);
        if (seen.has(key)) continue;
        seen.add(key);
        items.push(it);
      }
      render();
    }

    fileInput.addEventListener("change", e => {
      addFiles(e.target.files);
      fileInput.value = "";
    });

    document.body.addEventListener("dragover", e => {
      e.preventDefault();
    });
    document.body.addEventListener("drop", e => {
      e.preventDefault();
      addFiles(e.dataTransfer.files);
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    copyBtn.addEventListener("click", async () => {
      if (!items.length) return;
      const ordered = [...items].sort(sortByName);

      let html =
        '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>\n';
      let plain = "";
      ordered.forEach(({ name, dataUrl }) => {
        html += `<p><strong>${escapeHtml(name)}</strong></p>\n`;
        html += `<p><img src="${dataUrl}" alt="${escapeAttr(name)}" /></p>\n`;
        plain += name + "\n\n";
      });
      html += "</body></html>";
      plain += "(Word için görseller HTML ile yapıştırıldı.)";

      try {
        const htmlBlob = new Blob([html], { type: "text/html" });
        const textBlob = new Blob([plain], { type: "text/plain" });
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": htmlBlob,
            "text/plain": textBlob
          })
        ]);
        showToast("Kopyalandı — Word’de Ctrl+V");
      } catch (err) {
        console.error(err);
        try {
          await navigator.clipboard.writeText(html);
          showToast("Yedek: ham HTML metin olarak kopyalandı");
        } catch (e2) {
          window.alert(
            "Panoya yazılamadı. Sayfayı https üzerinden veya localhost’ta açmayı deneyin; tarayıcı izni gerekebilir."
          );
        }
      }
    });

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/"/g, "&quot;");
    }

    render();
  </script>
</body>
</html>
